<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ignyte Dashboard</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#fff; overflow:hidden; }
  img {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit: fill;
    opacity:0; transition: opacity 1s ease-in-out;
  }
  img.active { opacity:1; z-index:1; }
</style>
</head>
<body>
<img id="s0" class="active" src="page1.png" alt="Page 1">
<img id="s1" src="page2.png" alt="Page 2">
<script>
  // Rotate every 60 seconds
  let current = 0;
  const imgs = [document.getElementById('s0'), document.getElementById('s1')];
  let loaded = 0;

  const startRotation = () => {
    setInterval(() => {
      const next = 1 - current;
      imgs[next].classList.add('active');
      imgs[current].classList.remove('active');
      current = next;
    }, 60000);
  };

  imgs.forEach(img => {
    img.addEventListener('load', () => {
      loaded++;
      if (loaded === 2) startRotation();
    });
    // Handle already-cached images
    if (img.complete) {
      loaded++;
      if (loaded === 2) startRotation();
    }
  });

  // Reload daily at 07:05 (5 min after screenshot cron at 07:00) to pick up fresh images
  const scheduleReload = () => {
    const now = new Date();
    const next = new Date(now);
    next.setHours(7, 5, 0, 0);
    if (next <= now) next.setDate(next.getDate() + 1);
    setTimeout(() => location.reload(), next - now);
  };
  scheduleReload();
</script>
</body>
</html>
