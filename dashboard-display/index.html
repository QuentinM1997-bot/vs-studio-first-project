<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ignyte Dashboard</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
  img {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit: cover; object-position: top left;
    opacity:0; transition: opacity 1s ease-in-out;
  }
  img.active { opacity:1; z-index:1; }
</style>
</head>
<body>
<img id="s0" class="active" alt="Page 1">
<img id="s1" alt="Page 2">
<script>
  // Cache-busting key: changes every 12h → forces new screenshot from thum.io
  const cb = Math.floor(Date.now() / (12 * 3600 * 1000)) + "_v3";
  const pages = [
    "https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_cgr1rn38zd",
    "https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_b8w3oo38zd"
  ];
  const thumbBase = "https://image.thum.io/get/width/3840/crop/2160/wait/8/png/";
  const imgs = [document.getElementById('s0'), document.getElementById('s1')];

  // Set screenshot URLs with cache-buster
  imgs[0].src = thumbBase + pages[0] + "?cb=" + cb;
  imgs[1].src = thumbBase + pages[1] + "?cb=" + cb;

  // Rotate every 60 seconds
  let current = 0;
  let loaded = 0;
  const startRotation = () => {
    setInterval(() => {
      const next = 1 - current;
      imgs[next].classList.add('active');
      imgs[current].classList.remove('active');
      current = next;
    }, 60000);
  };

  imgs.forEach(img => {
    img.addEventListener('load', () => {
      loaded++;
      if (loaded === 2) startRotation();
    });
  });

  // Reload page every 12h to pick up fresh screenshots
  setTimeout(() => location.reload(), 12 * 3600 * 1000);
</script>
</body>
</html>
