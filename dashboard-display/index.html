<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ignyte Dashboard</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
  iframe {
    position:absolute; top:0; left:0;
    width:100%; height:100%; border:0;
    opacity:0; transition: opacity 0.6s ease-in-out;
  }
  iframe.active { opacity:1; z-index:1; }
</style>
</head>
<body>
<iframe id="f0" class="active" src="https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_cgr1rn38zd"></iframe>
<iframe id="f1" src="https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_b8w3oo38zd"></iframe>
<script>
  const urls = [
    "https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_cgr1rn38zd",
    "https://lookerstudio.google.com/embed/reporting/0809760c-30c8-4961-85b4-ddf29531e4a8/page/p_b8w3oo38zd"
  ];
  const frames = [document.getElementById('f0'), document.getElementById('f1')];
  let current = 0;
  const INTERVAL_MS = 30000;

  setInterval(() => {
    const next = 1 - current;
    frames[next].src = urls[next];
    frames[next].classList.add('active');
    frames[current].classList.remove('active');
    current = next;
  }, INTERVAL_MS);

  setTimeout(() => location.reload(), 3600 * 1000);
</script>
</body>
</html>
